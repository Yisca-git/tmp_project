<div class="login-container">
  <div class="login-card">
    <div class="card-header">
      <h1>ברוכים השבים</h1>
      <p>התחברו לחשבון שלכם</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="firstName">שם פרטי</label>
        <input pInputText id="firstName" [(ngModel)]="user.firstName" name="firstName" required placeholder="הזינו שם פרטי" />
      </div>

      <div class="field">
        <label for="lastName">שם משפחה</label>
        <input pInputText id="lastName" [(ngModel)]="user.lastName" name="lastName" required placeholder="הזינו שם משפחה" />
      </div>

      <div class="field">
        <label for="password">סיסמה</label>
        <p-password [(ngModel)]="user.password" name="password" [feedback]="false" [toggleMask]="true" required placeholder="הזינו סיסמה"></p-password>
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          <i class="pi pi-exclamation-circle"></i>
          {{ errorMessage() }}
        </div>
      }

      <div class="button-group">
        <p-button type="submit" label="התחבר" icon="pi pi-sign-in" [loading]="loading()" [disabled]="!loginForm.valid"></p-button>
        <p-button type="button" label="התחבר כמנהל" icon="pi pi-shield" severity="secondary" [loading]="loading()" [disabled]="!loginForm.valid" (onClick)="loginAsAdmin()"></p-button>
      </div>
    </form>

    <div class="register-link">
      אין לך חשבון? <a (click)="navigateToRegister()">הרשם כאן</a>
    </div>
  </div>
</div>
